<!DOCTYPE html>
<html>
<head>
    <title>Login - Big Small Arena</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:15px;
            width:320px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        #msg{
            margin-top:10px;
            color:red;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script>
function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // Demo credentials
    if(username === "admin" && password === "12345"){
        window.location.href = "game.html";
    }
    else{
        document.getElementById("msg").innerHTML =
            "Invalid Username or Password";
    }
}
</script>

</body>
</html>
